# Service 1
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-1-account
  namespace: service-1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-1
  namespace: service-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-1
  template:
    metadata:
      labels:
        app: service-1
    spec:
      serviceAccountName: service-1-account
      containers:
      - name: app
        image: ealen/echo-server:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-1
  namespace: service-1
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: service-1
---
